<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Check Games</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <h1 class="title">🔍 Check Eligibility</h1>

        <div class="rules-box">
            <h4>📋 Rules</h4>
            <p>🟡 <strong>3 Yellow Cards</strong> = 1 game ban → yellows reset after ban</p>
            <p>🔴 <strong>1 Red Card</strong> = 3 game ban → yellows also reset</p>
            <p>🏥 <strong>Injury</strong> = 3 game ban → auto countdown each team match</p>
            <p>⚠️ Bans only count down when the <strong>player's team</strong> plays</p>
        </div>

        <div class="form-card">
            <div class="form-container">
                <label>Team 1:
                    <select id="checkTeam1">
                        <option value="">Select Team</option>
                        <option>SPAIN</option>
                        <option>FRANCE</option>
                        <option>GERMANY</option>
                    </select>
                </label>
                <label>Team 2:
                    <select id="checkTeam2">
                        <option value="">Select Team</option>
                        <option>SPAIN</option>
                        <option>FRANCE</option>
                        <option>GERMANY</option>
                    </select>
                </label>
                <div class="form-actions">
                    <button id="checkBtn">🔍 Check Players</button>
                    <button class="back-btn" onclick="location.href='index.html'">⬅ Back</button>
                </div>
            </div>
        </div>

        <div id="checkResult" style="display:none;" class="card">
            <div id="bannedList"></div>
        </div>
    </div>
    <script src="firebase.js"></script>
    <script src="script.js"></script>
</body>
</html>
