<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Injuries</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <h1 class="title">🏥 Injury List</h1>
        <div class="table-card">
            <div class="table-container">
                <table id="injuryTable" aria-label="Injury list">
                    <thead>
                        <tr>
                            <th>Team</th>
                            <th>Player</th>
                            <th>Games Left</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody><tr><td colspan="5" style="text-align:center;color:#4d6a85;padding:20px;">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>
        <p class="muted">Countdown only reduces when the player's team plays. Other teams' matches don't count.</p>
        <div class="btn-row">
            <button class="back-btn" onclick="location.href='index.html'">⬅ Back</button>
        </div>
    </div>
    <script src="firebase.js"></script>
    <script src="script.js"></script>
    <script>
        setTimeout(() => {
            if (window.db) {
                window.db.collection("playerInjuries").onSnapshot(snap => {
                    const injuries = [];
                    snap.forEach(doc => injuries.push(docToInjury(doc)));
                    renderInjuryTable(injuries);
                });
            }
        }, 1000);
    </script>
</body>
</html>
