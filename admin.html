<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <h1 class="title">🔐 Admin Panel</h1>

        <!-- Login -->
        <div class="form-card" id="passwordForm">
            <h3>Login</h3>
            <div class="form-container">
                <label>Admin Password
                    <input id="adminPassword" type="password" placeholder="Enter password" />
                </label>
                <div class="form-actions">
                    <button id="loginBtn">🔓 Login</button>
                    <button class="back-btn" onclick="location.href='index.html'">⬅ Back</button>
                </div>
            </div>
        </div>

        <!-- Admin Content -->
        <div id="adminContent" style="display:none;">

            <!-- Add Player -->
            <div class="form-card">
                <h3>➕ Add Player</h3>
                <div class="form-container">
                    <label>Team
                        <select id="adminTeam">
                            <option value="">Select Team</option>
                            <option value="SPAIN">SPAIN</option>
                            <option value="FRANCE">FRANCE</option>
                            <option value="GERMANY">GERMANY</option>
                        </select>
                    </label>
                    <label>Player Name
                        <input id="adminPlayer" type="text" placeholder="Enter player name" />
                    </label>
                    <div class="form-actions">
                        <button id="addPlayerBtn">➕ Add Player</button>
                    </div>
                </div>
            </div>

            <!-- Players Table -->
            <div class="table-card">
                <div class="table-container">
                    <table id="playersTable" aria-label="Players list">
                        <thead>
                            <tr>
                                <th>Team</th>
                                <th>Player</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td colspan="3" style="text-align:center;color:#4d6a85;padding:20px;">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="btn-row">
                <button class="back-btn" onclick="location.href='index.html'">⬅ Back to Home</button>
            </div>
        </div>
    </div>

    <script src="firebase.js"></script>
    <script src="script.js"></script>
</body>
</html>
