<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Football League</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>⚽ Football League</h1>
        <div class="buttons">
            <button onclick="location.href='table.html'">🏆 Table</button>
            <button onclick="location.href='matchweek.html'">⚽ Match Week</button>
            <button onclick="location.href='history.html'">📜 History</button>
            <button onclick="location.href='encounters.html'">🤝 Encounters</button>
            <button class="warning-btn" onclick="location.href='card-warning.html'">🟡 Card Warning</button>
            <button class="check-btn" onclick="location.href='check-games.html'">🔍 Check Games</button>
            <button onclick="location.href='injuries.html'" style="border-color:rgba(255,111,0,0.3);">🏥 Injuries</button>
            <button class="admin-btn" onclick="location.href='admin.html'">🔐 Admin</button>
            <button onclick="location.href='champions.html'" style="grid-column:1/-1;background:linear-gradient(135deg,#1a1400,#2a2000);border-color:rgba(255,214,0,0.4);color:#ffd600;font-size:clamp(1rem,3vw,1.3rem);letter-spacing:0.1em;text-shadow:0 0 20px rgba(255,214,0,0.4);">🏆 CHAMPIONS WON</button>
            <button onclick="location.href='press-conference.html'" style="border-color:rgba(30,136,229,0.35);color:#1e88e5;">🎙️ Press Conference</button>
            <button onclick="location.href='admin-press.html'" style="border-color:rgba(0,200,83,0.3);color:#00c853;">📋 Admin Press</button>
        </div>
    </div>
</body>
</html>
