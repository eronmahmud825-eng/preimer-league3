<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Match Week</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <h1 class="title">⚽ Match Week</h1>

        <!-- Match Form -->
        <div class="form-card" id="matchForm">
            <h3>Add Match Result</h3>
            <div class="form-container">
                <label>Admin Password
                    <input id="adminPass" type="password" placeholder="Enter password" />
                </label>
                <label>Team 1
                    <select id="team1">
                        <option value="">Select Team</option>
                        <option>SPAIN</option>
                        <option>FRANCE</option>
                        <option>GERMANY</option>
                    </select>
                </label>
                <label>Score 1
                    <input id="score1" type="number" min="0" placeholder="0" />
                </label>
                <label>Team 2
                    <select id="team2">
                        <option value="">Select Team</option>
                        <option>SPAIN</option>
                        <option>FRANCE</option>
                        <option>GERMANY</option>
                    </select>
                </label>
                <label>Score 2
                    <input id="score2" type="number" min="0" placeholder="0" />
                </label>
                <label>Date
                    <input id="matchDate" type="date" />
                </label>
                <div class="form-actions">
                    <button id="saveMatchBtn">💾 Save Match</button>
                    <button class="back-btn" onclick="location.href='index.html'">⬅ Back</button>
                </div>
            </div>
        </div>

        <!-- Cards + Injuries Form -->
        <div class="form-card" id="cardForm" style="display:none;">
            <span id="currentGWLabel"></span>

            <!-- Card Warning -->
            <h3 style="color:#fdd835;">🟡🔴 Card Warning</h3>
            <div class="form-container">
                <label>Team
                    <select id="cardTeam"><option value="">Select Team</option></select>
                </label>
                <label>Player
                    <select id="playerSelect"><option value="">Select Player</option></select>
                </label>
                <label>Card Type</label>
                <div class="card-radio-group">
                    <label class="card-radio-label yellow">
                        <input type="radio" name="cardType" value="yellow" />
                        🟡 Yellow Card
                    </label>
                    <label class="card-radio-label red">
                        <input type="radio" name="cardType" value="red" />
                        🔴 Red Card
                    </label>
                </div>
                <div class="form-actions">
                    <button id="addCardBtn">➕ Add Card</button>
                </div>
            </div>

            <hr class="section-divider" />

            <!-- Injury -->
            <h3 style="color:#ff6f00;">🏥 Injury Report</h3>
            <div class="form-container">
                <label>Team
                    <select id="injuryTeam"><option value="">Select Team</option></select>
                </label>
                <label>Player
                    <select id="injuryPlayerSelect"><option value="">Select Player</option></select>
                </label>
                <label>Injury Type</label>
                <div class="card-radio-group">
                    <label class="card-radio-label" style="border-color:rgba(255,193,7,0.3);">
                        <input type="radio" name="injuryType" value="easy" />
                        🟡 Easy — 1 Game
                    </label>
                    <label class="card-radio-label" style="border-color:rgba(244,67,54,0.3);">
                        <input type="radio" name="injuryType" value="hard" />
                        🔴 Hard — 5 Games
                    </label>
                </div>
                <div class="form-actions">
                    <button id="addInjuryBtn">🏥 Add Injury</button>
                </div>
            </div>

            <hr class="section-divider" />

            <div class="form-actions">
                <button id="okBtn" class="ok-btn">✅ Done — Go Home</button>
            </div>
        </div>
    </div>
    <script src="firebase.js"></script>
    <script src="script.js"></script>
</body>
</html>
